name: version-tag

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write
  packages: write

jobs:
  semver-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Cross-build preflight
        shell: bash
        run: |
          set -euo pipefail
          for target in "linux amd64" "linux arm64" "darwin amd64" "darwin arm64"; do
            read -r goos goarch <<< "$target"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build -o "/tmp/avdctl-$goos-$goarch" ./cmd/avdctl
            echo "ok $goos/$goarch"
          done

      - name: Compute Next Version
        id: semver
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force
          last_tag="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"

          if [ -z "$last_tag" ]; then
            last_tag="v0.0.0"
            range="HEAD"
          else
            range="${last_tag}..HEAD"
          fi

          commits="$(git log --format=%s%n%b "$range")"
          subjects="$(git log --format=%s "$range")"

          # Conventional commit bump rules:
          # - major: breaking change footer or "type(scope)!:"
          # - minor: feat
          # - patch: fix, perf, refactor, revert
          bump=""
          reason=""
          if echo "$commits" | grep -Eiq 'BREAKING CHANGE|^[a-z]+(\([^)]+\))?!:'; then
            bump="major"
            reason="breaking change"
          elif echo "$commits" | grep -Eiq '^feat(\([^)]+\))?:'; then
            bump="minor"
            reason="feat"
          elif echo "$subjects" | grep -Eiq '^(fix|perf|refactor|revert)(\([^)]+\))?:'; then
            bump="patch"
            reason="maintenance/fix commit"
          fi

          if [ -z "$bump" ]; then
            {
              echo "release=false"
              echo "last_tag=$last_tag"
              echo "range=$range"
            } >> "$GITHUB_OUTPUT"
            {
              echo "### Semver decision"
              echo "- Last tag: \`$last_tag\`"
              echo "- Range: \`$range\`"
              echo "- Decision: no release (no releasable conventional commits found)"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          version="${last_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"

          case "$bump" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"

          if git rev-parse "$next_tag" >/dev/null 2>&1; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "release=true"
            echo "next_tag=$next_tag"
            echo "last_tag=$last_tag"
            echo "range=$range"
            echo "bump=$bump"
          } >> "$GITHUB_OUTPUT"
          {
            echo "### Semver decision"
            echo "- Last tag: \`$last_tag\`"
            echo "- Range: \`$range\`"
            echo "- Bump: \`$bump\` ($reason)"
            echo "- Next tag: \`$next_tag\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create Tag
        if: steps.semver.outputs.release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.semver.outputs.next_tag }}"
          git push origin "${{ steps.semver.outputs.next_tag }}"

      - name: Install Syft
        if: steps.semver.outputs.release == 'true'
        uses: anchore/sbom-action/download-syft@v0

      - name: Release
        if: steps.semver.outputs.release == 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.semver.outputs.next_tag }}

      - name: Attest Artifacts
        if: steps.semver.outputs.release == 'true'
        uses: actions/attest-build-provenance@v3
        with:
          subject-checksums: dist/checksums.txt

      - name: Set Image Name
        if: steps.semver.outputs.release == 'true'
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Setup QEMU
        if: steps.semver.outputs.release == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        if: steps.semver.outputs.release == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Detect DHI Credentials
        if: steps.semver.outputs.release == 'true'
        id: dhi_creds
        env:
          DHI_USERNAME: ${{ secrets.DHI_USERNAME }}
          DHI_TOKEN: ${{ secrets.DHI_TOKEN }}
        run: |
          if [ -n "$DHI_USERNAME" ] && [ -n "$DHI_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to DHI (optional)
        if: steps.semver.outputs.release == 'true' && steps.dhi_creds.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DHI_USERNAME }}
          password: ${{ secrets.DHI_TOKEN }}

      - name: Login to GHCR
        if: steps.semver.outputs.release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata
        if: steps.semver.outputs.release == 'true'
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.semver.outputs.next_tag }}
            type=raw,value=latest

      - name: Build and Push Binary Image
        if: steps.semver.outputs.release == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.binary
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.semver.outputs.next_tag }}
