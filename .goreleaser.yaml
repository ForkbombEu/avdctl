# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: avdctl

builds:
  - id: avdctl
    main: ./cmd/avdctl
    binary: avdctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    ids:
      - avdctl
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: checksums.txt

sboms:
  - id: archives
    artifacts: archive
  - id: source
    artifacts: source

source:
  enabled: true

release:
  prerelease: auto
