# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: avdctl

builds:
  - id: avdctl
    main: ./cmd/avdctl
    binary: avdctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: default
    ids:
      - avdctl
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: checksums.txt

changelog:
  disable: true

source:
  enabled: true

release:
  prerelease: auto
